server:
  port: 8080
  servlet:
    context-path: /ceshi

spring:
  application:
    name: aichatroom
  datasource:
    url: jdbc:mysql://localhost:3306/chatroom?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: aichat
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.example.aichatroom: DEBUG
    org.springframework: INFO
jwt:
  # 密钥（至少32位，建议使用复杂字符串）
  secret: your-secret-key-here-at-least-32-characters-long
  # 过期时间：7天（单位：毫秒）
  expiration: 604800000